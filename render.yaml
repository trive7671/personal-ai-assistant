services:
  - type: web
    name: aegis-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOWED_ORIGIN_REGEX
        value: "https?://.*\\.vercel\\.app"

databases:
  - name: aegis-db
    databaseName: aegis
    user: aegis_user
