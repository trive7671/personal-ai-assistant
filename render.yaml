services:
  - type: web
    name: aegis-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn backend.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOWED_ORIGIN_REGEX
        value: "https?://.*\\.vercel\\.app"
      - key: NVIDIA_API_KEY
        value: "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"
      - key: NVIDIA_NIM_URL
        value: "https://integrate.api.nvidia.com/v1/chat/completions"
      - key: NVIDIA_NIM_MODEL
        value: "meta/llama-3.1-8b-instruct"

databases:
  - name: aegis-db
    databaseName: aegis
    user: aegis_user
    plan: free
